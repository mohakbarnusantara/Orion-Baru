<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">

<body>
    <h1>Pertmuan 6 </h1>
    <form action="">
        <label for="nama">Nama</label>

        <label for="nim">Nim</label>
        <input type="text" name="nim" id="nim">

    </form>
    <br>
    <h2>radio</h2>
    <form action="">
        <input type="radio" id="html" name="fav_lang" value="HTML">
        <label for="html">HTML</label>
        <br>
        <input type="radio" id="css" name="fav_lang" value="css">
        <label for="css">CSS</label>
        <br>
        <input type="radio" id="java" name="fav_lang" value="java">
        <label for="java">Java</label>

    </form>
    <br>
    <h2>checkbox</h2>
    <form action="">
        <input type="checkbox" id="mobil" name="mobil1" value="mobil1">

        <br>
        <input type="checkbox" id="mobil2" name="mobil2" value="mobil2">

    </form>
    <br>
    <h2>text Area</h2>

        <label for="massage">Teks :</label>
        <br>
        <textarea name="" id="massage" cols="50" rows="4"></textarea>
    </form>

    <br>

    <label for="">Pilih mobil</label>

        <option value="volvo">volvo</option>
        <option value="honda">honda</option>
        <option value="toyota">toyota</option>
        <option value="hyundai">hyundai</option>
    </select>
</body>
</html>
